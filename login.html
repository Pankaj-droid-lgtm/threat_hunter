<!DOCTYPE html>
<html>
<head>
    <title>AI Threat Hunter Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 150, 0.15);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .title {
            margin-bottom: 20px;
            font-size: 14px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #334155;
            border-radius: 8px;
            outline: none;
            background: #0f172a;
            color: white;
            transition: 0.3s;
        }

        input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 5px #22c55e;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
            box-shadow: 0 0 10px #22c55e;
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
            font-size: 14px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>🔐 AI Threat Hunter</h2>
    <div class="title">Secure Login Panel</div>

    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="footer">
        © 2026 Threat Hunter System
    </div>
</div>

</body>
</html>
