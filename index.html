<!DOCTYPE html>
<html>
<head>
    <title>Threat Hunter Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        form {
            background: #1e293b;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }

        a {
            color: #38bdf8;
        }
    </style>
</head>

<body>

<h2>🚀 Threat Hunter Dashboard</h2>

<form action="/add_log" method="post">
    <input type="text" name="user" placeholder="User"><br>
    <input type="text" name="activity" placeholder="Activity"><br>
    <input type="text" name="status" placeholder="Status"><br>
    <button type="submit">Add Log</button>
</form>

<br><br>

<a href="/logs">📄 View Logs</a><br>
<a href="/add_test">➕ Add Test Log</a>

</body>
</html>
